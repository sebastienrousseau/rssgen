name: 🦀 Continuous Integration

on:
  push:
    branches: ["main", "feat/*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '-D warnings'
  RUST_BACKTRACE: 1

jobs:
  # ==============================================================================
  # FORMATTING CHECK
  # ==============================================================================
  fmt:
    name: 🎨 Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: 🎨 Check formatting
        run: cargo fmt --all -- --check

  # ==============================================================================
  # LINTING WITH CLIPPY
  # ==============================================================================
  clippy:
    name: 📎 Clippy Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: ⚡ Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: 📎 Run clippy (all features)
        run: cargo clippy --workspace --all-features --all-targets --no-deps -- -D warnings

      - name: 📎 Run clippy (no default features)
        run: cargo clippy --workspace --no-default-features --all-targets --no-deps -- -D warnings

  # ==============================================================================
  # DOCUMENTATION BUILD
  # ==============================================================================
  docs:
    name: 📚 Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: ⚡ Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: docs-${{ hashFiles('**/Cargo.lock') }}

      - name: 📚 Build documentation
        run: cargo doc --workspace --all-features --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: '-D warnings'

  # ==============================================================================
  # SECURITY AND DEPENDENCY AUDITING
  # ==============================================================================
  audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 🔒 Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: 🔒 Run cargo deny check
        run: cargo deny check

  # ==============================================================================
  # MSRV VERIFICATION
  # ==============================================================================
  msrv:
    name: 🗓️ MSRV Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 📋 Read MSRV from Cargo.toml
        id: msrv
        run: |
          MSRV=$(grep '^rust-version = ' Cargo.toml | sed 's/rust-version = "\(.*\)"/\1/')
          echo "version=$MSRV" >> $GITHUB_OUTPUT
          echo "📌 MSRV: $MSRV"

      - name: 🦀 Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: ⚡ Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-${{ steps.msrv.outputs.version }}-${{ hashFiles('**/Cargo.lock') }}

      - name: 🗓️ Test with MSRV
        run: cargo test --workspace --all-features

  # ==============================================================================
  # COMPREHENSIVE TESTING MATRIX
  # ==============================================================================
  test:
    name: 🧪 Test Suite
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
        include:
          # Add Windows if needed in future
          # - os: windows-latest
          #   rust: stable

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: ⚡ Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}

      - name: 🧪 Run tests (all features)
        run: cargo test --workspace --all-features --verbose

      - name: 🧪 Run tests (no default features)
        run: cargo test --workspace --no-default-features --verbose

      - name: 🧪 Run tests (default features only)
        run: cargo test --workspace --verbose

      - name: 📊 Run doctests
        run: cargo test --workspace --all-features --doc

  # ==============================================================================
  # UNSAFE CODE VALIDATION WITH MIRI
  # ==============================================================================
  miri:
    name: 👻 Miri (Unsafe Code Check)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 🦀 Install nightly Rust with miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: ⚡ Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: miri-${{ hashFiles('**/Cargo.lock') }}

      - name: 👻 Setup miri
        run: cargo miri setup

      - name: 👻 Run tests under miri
        run: cargo miri test --workspace --all-features
        env:
          MIRIFLAGS: '-Zmiri-strict-provenance'

  # ==============================================================================
  # NIGHTLY COMPILER TESTING
  # ==============================================================================
  nightly:
    name: 🌙 Nightly Rust Testing
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true  # Allow nightly failures
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 🦀 Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: ⚡ Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ hashFiles('**/Cargo.lock') }}

      - name: 🧪 Run tests on nightly
        run: cargo test --workspace --all-features --verbose

      - name: 📎 Run clippy on nightly
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings
        continue-on-error: true

  # ==============================================================================
  # RELEASE PREPARATION CHECKS
  # ==============================================================================
  release-ready:
    name: 🚀 Release Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 🦀 Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: ⚡ Setup cache
        uses: Swatinem/rust-cache@v2

      - name: 📦 Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: 🔍 Check semver compatibility
        run: cargo semver-checks check-release

      - name: 📋 Verify package contents
        run: cargo package --list

  # ==============================================================================
  # FINAL INTEGRATION CHECK
  # ==============================================================================
  integration:
    name: ✅ Integration Check
    runs-on: ubuntu-latest
    needs: [fmt, clippy, docs, audit, msrv, test, miri]
    timeout-minutes: 10
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v6

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: ⚡ Setup cache
        uses: Swatinem/rust-cache@v2

      - name: 🔧 Final build check
        run: cargo build --workspace --all-features --release

      - name: ✅ All checks passed
        run: |
          echo "🎉 All CI checks have passed successfully!"
          echo "✅ Formatting: PASSED"
          echo "✅ Linting: PASSED"
          echo "✅ Documentation: PASSED"
          echo "✅ Security Audit: PASSED"
          echo "✅ MSRV Compatibility: PASSED"
          echo "✅ Test Suite: PASSED"
          echo "✅ Unsafe Code Validation: PASSED"
          echo "🚀 Ready for deployment!"